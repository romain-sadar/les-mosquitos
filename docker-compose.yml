version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: django_postgis
    restart: always
    environment:
      POSTGRES_DB: django
      POSTGRES_USER: django
      POSTGRES_PASSWORD: django
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  web:
    build: .
    container_name: django_app
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_NAME: django
      DB_USER: django
      DB_PASSWORD: django
      DB_HOST: db
      DB_PORT: 5432
      MAPBOX_TOKEN: 

volumes:
  postgres_data: